api:
  api_key: "${QWEN_API_KEY}"
  api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  visual_model: "qwen3.5-plus"
  request_timeout_seconds: 120
  max_retries: 5
  retry_backoff_seconds: 3
  visual_concurrency: 16
  visual_batch_size: 4
  visual_max_image_side: 960
  visual_jpeg_quality: 85
  enable_thinking: false
  max_completion_tokens: 2000

input:
  slice_results_dir: "data/raw/frame_slices_source/切片结果/all_ph12_20260327_113618"
  video_text_codes_path: "data/processed/video_level_final_449.csv"

output:
  output_dir: "outputs/frame_classification/visual"

coding:
  visual_system_prompt_path: "./prompts/visual_system_prompt.txt"
  visual_labels:
    - "支持"
    - "反对"
    - "中立"
  arousal_labels:
    - "煽动"
    - "说明"
    - "缓释"
  confidence_labels:
    - "low"
    - "medium"
    - "high"
  visual_label_aliases: {}
  arousal_label_aliases: {}
  confidence_aliases: {}

pipeline:
  overwrite_existing: false
